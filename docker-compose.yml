version: '3.8'

services:
  agent-hub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-hub
    ports:
      - "${HUB_PORT:-8765}:8765"
    volumes:
      # Persist the SQLite database across container restarts
      - hub-data:/app/data
    environment:
      - AGENT_HUB_HOST=0.0.0.0
      - AGENT_HUB_PORT=8765
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/agents')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  hub-data:
    driver: local
